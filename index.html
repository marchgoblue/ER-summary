<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ER One-Page Summary</title>
  <link rel="stylesheet" href="css/styles.css">
  <!-- SMART on FHIR client (used for live Epic connections; demo mode works without a launch context) -->
  <script src="https://cdn.jsdelivr.net/npm/fhirclient@2.5.4/build/fhir-client.min.js"></script>
  <!-- Tesseract.js for client-side OCR of scanned outside media -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js"></script>
</head>
<body>
  <header class="app-header">
    <div class="app-title">ER One-Page Summary</div>
    <div class="header-controls">
      <div id="mode-badge" class="mode-badge">Starting…</div>
      <button id="refresh-btn" class="hdr-btn tip" data-tip="Refresh chart data now. When connected to a FHIR server, data also refreshes automatically every 2 minutes.">&#x21bb;</button>
      <button id="theme-toggle" class="hdr-btn">Dark</button>
    </div>
  </header>

  <button id="tray-toggle" class="edge-tab" aria-label="Open outside records and visits">
    <span class="edge-label">Outside records &amp; visits</span>
  </button>

  <main id="main">
    <div class="loading">Loading patient summary…</div>
  </main>

  <div id="tray-backdrop" class="tray-backdrop" onclick="document.getElementById('tray-toggle').click()"></div>
  <aside id="tray" class="tray" aria-label="Visits and outside records">
    <div class="tray-head">
      <span>Visits &amp; outside records</span>
      <button class="tray-close" onclick="document.getElementById('tray-toggle').click()">✕</button>
    </div>
    <div id="tray-body" class="tray-body"></div>
  </aside>

  <div id="ocr-status" class="ocr-status"></div>

  <script src="js/fhir-data.js"></script>
  <script src="js/risk-engine.js"></script>
  <script src="js/summary.js"></script>
  <script src="js/ocr.js"></script>
  <script src="js/demo-data.js"></script>
  <script src="js/demo-outside-docs.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
